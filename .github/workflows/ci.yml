name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test-java:
    name: "Java Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Check if gradlew exists
        id: gradle-check
        run: |
          if [ -f "gradlew" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Java 21
        if: steps.gradle-check.outputs.exists == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Make gradlew executable
        if: steps.gradle-check.outputs.exists == 'true'
        run: chmod +x ./gradlew

      - name: Run tests
        if: steps.gradle-check.outputs.exists == 'true'
        run: bash ./run-tests.sh

      - name: Upload JUnit reports
        if: always() && steps.gradle-check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: java-test-reports
          path: build/test-results/test/

  build:
    name: "Build Docker - Back"
    runs-on: ubuntu-latest
    needs: test                         # wait for the tests to pass
    if: github.event_name == 'push'     # not on PRs
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  release:
    name: "Release - Back"
    runs-on: ubuntu-latest
    needs: build                        # wait for the build to succeed
    if: github.event_name == 'push'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --save-dev semantic-release @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/github
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Used for creating releases and commenting on PRs