name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:

  test-java:
    name: "Java Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Check if gradlew exists
        id: gradle-check
        run: |
          if [ -f "gradlew" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Java 21
        if: steps.gradle-check.outputs.exists == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: gradle

      - name: Make run-tests executable
        if: steps.gradle-check.outputs.exists == 'true'
        run: chmod +x ./run-tests.sh

      - name: Run backend tests
        if: steps.gradle-check.outputs.exists == 'true'
        run: ./run-tests.sh

      - name: Upload JUnit reports
        if: always() && steps.gradle-check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: java-test-reports
          path: build/test-results/test/

  build:
    name: "Build Docker - Back"
    runs-on: ubuntu-latest
    needs: test-java
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  release:
    name: "Release - Back"
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install semantic-release
        run: npm install --save-dev semantic-release @semantic-release/commit-analyzer @semantic-release/release-notes-generator @semantic-release/github

      - name: Run semantic-release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}